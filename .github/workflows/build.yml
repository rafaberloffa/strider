name: Build Strider

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build on windows-latest
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: steptrace/package-lock.json

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './steptrace/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: steptrace

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './steptrace'
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Strider ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steptrace-windows
          path: |
            steptrace/src-tauri/target/release/bundle/msi/*.msi
            steptrace/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
